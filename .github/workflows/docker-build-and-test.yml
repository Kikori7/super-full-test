name: Docker Build & Push

# ======================== 触发条件 ========================
on:
  # PR 合并到 master 时才构建镜像
  pull_request:
    branches: [master]
    types: [closed]

  # 手动触发
  workflow_dispatch:
    inputs:
      branch:
        description: '要构建的分支'
        required: false
        default: 'main'

env:
  IMAGE_NAME: super-full-test

# ======================== Job ========================
jobs:
  build-and-push:
    name: Build Image & Push to Docker Hub
    runs-on: ubuntu-latest

    # 仅 PR 真正合并时执行（关闭但不合并的 PR 不触发）
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建镜像 & 推送
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 镜像信息
        run: |
          echo ""
          echo "=============================================="
          echo "  镜像已推送到 Docker Hub"
          echo "=============================================="
          echo ""
          echo "  📦 ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
          echo ""
          echo "  在你的 Docker 主机上执行："
          echo "  ┌────────────────────────────────────────────┐"
          echo "  │ alias runtest='docker run --pull=always --rm ${{ secrets.DOCKER_USERNAME }}/super-full-test:latest'"
          echo "  │"
          echo "  │ runtest                                         # 全量"
          echo "  │ runtest mvn test -Dtest=CartButtonDisplayTest   # 指定类"
          echo "  │ runtest mvn test -DsuiteXmlFile=src/test/resources/testng.xml -Dtest.retry.max=5"
          echo "  └────────────────────────────────────────────┘"
          echo ""
