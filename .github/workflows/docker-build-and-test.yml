name: Docker Build & Push

# ======================== 触发条件  ========================
on:
  # PR 合并到 master 时才构建镜像
  pull_request:
    branches: [master]
    types: [closed]

  # 手动触发
  workflow_dispatch:
    inputs:
      branch:
        description: '要构建的分支'
        required: false
        default: 'main'

env:
  IMAGE_NAME: super-full-test
  REGISTRY: ghcr.io

# ======================== Job ========================
jobs:
  build-and-push:
    name: Build Image & Push to Registry
    runs-on: ubuntu-latest

    # 仅 PR 真正合并时执行（关闭但不合并的 PR 不触发）
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true

    # 权限：允许推送 packages
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: 转换仓库 owner 为小写（GHCR 要求）
        run: echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建镜像 & 推送
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 镜像信息
        run: |
          echo ""
          echo "=============================================="
          echo "  镜像已推送到 GitHub Container Registry"
          echo "=============================================="
          echo ""
          echo "  📦 ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME }}:latest"
          echo ""
          echo "  在你的 Docker 主机上执行："
          echo "  ┌────────────────────────────────────────────┐"
          echo "  │ # 一行命令，自动拉最新镜像 + 跑测试"
          echo "  │ alias runtest='docker run --pull=always --rm ghcr.io/${{ env.OWNER_LC }}/super-full-test:latest'"
          echo "  │"
          echo "  │ # 全量测试"
          echo "  │ runtest"
          echo "  │"
          echo "  │ # 指定类"
          echo "  │ runtest mvn test -Dtest=CartButtonDisplayTest"
          echo "  │"
          echo "  │ # 指定 suite + 自定义重试"
          echo "  │ runtest mvn test -DsuiteXmlFile=src/test/resources/testng.xml \\"
          echo "  │   -Dtest.retry.max=5 -Dtest.retry.enabled=true"
          echo "  └────────────────────────────────────────────┘"
          echo ""
